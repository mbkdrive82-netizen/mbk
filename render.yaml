# Render Blueprint — MBK backend API
# Dashboard: New > Blueprint > connect repo, or set these manually on the Web Service.
#
# If you see "failed to read dockerfile: open npm install":
#   Settings > Environment = Node (NOT Docker)
#   Root Directory = backend
#   Build Command = npm install
#   Start Command = npm start
#
# Required in Render dashboard (not committed):
# GOOGLE_SERVICE_ACCOUNT_JSON, GOOGLE_DRIVE_FOLDER_ID, MONGODB_URI
# JWT_SECRET, SESSION_SECRET, FRONTEND_URL, BACKEND_URL
# Email (recommended Hostinger domain mailbox on Render):
#   SMTP_HOST=smtp.hostinger.com
#   SMTP_PORT=465
#   SMTP_SECURE=true
#   EMAIL_USER=official@mbktechnologies.info
#   EMAIL_PASS=<mailbox password>
#   EMAIL_FROM="MBK CarrierZ" <official@mbktechnologies.info>
# Gmail fallback: EMAIL_SERVICE=gmail, EMAIL_USER, EMAIL_PASS (App Password)

services:
  - type: web
    name: mbk-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: drive_only
      - key: DISABLE_LOCAL_FILE_FALLBACK
        value: "1"
      - key: DISABLE_REDIS
        value: "1"
      - key: ALLOW_OTP_DEBUG
        value: "0"
